name: CI — Lint, Test & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + validate ─────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Validate FastAPI app starts
        run: |
          # Start server, wait, health-check, then shut down
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          SERVER_PID=$!
          sleep 4
          curl -f http://localhost:8001/health || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID
        env:
          GEMINI_API_KEY: ""
          GROQ_API_KEY: ""
          SENDGRID_API_KEY: ""
          SMTP_USER: ""
          SMTP_PASS: ""

  # ── Backend: Docker build ────────────────────────────────────────────────────
  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sia-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend: lint + build ───────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com

  # ── Frontend: Docker build ───────────────────────────────────────────────────
  frontend-docker:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    needs: frontend-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sia-frontend:ci
          build-args: |
            VITE_API_URL=https://placeholder.onrender.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
